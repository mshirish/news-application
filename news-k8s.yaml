apiVersion: apps/v1
kind: Deployment
metadata:
  name: news
spec:
  replicas: 3
  selector:
    matchLabels:
      app: news
  template:
    metadata:
      labels:
        app: news
    spec:
      containers:
        - name: news
          image: news-application
          imagePullPolicy: Never
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: news
spec:
  type: LoadBalancer
  selector:
    app: news
  ports:
    - port: 80
      targetPort: 80