name: Docker Publish
on: push
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v7

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build the image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/news-app:${{ github.sha }} -t ${{ secrets.DOCKERHUB_USERNAME }}/news-app:latest .

      - name: Push both tags
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/news-app:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/news-app:latest